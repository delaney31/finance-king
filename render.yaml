# Finance King — Render development/staging stack
# Dashboard: https://dashboard.render.com → New → Blueprint → connect finance-king repo
#
# After first deploy:
# 1. Set STORAGE_* env vars (Cloudflare R2 recommended — see docs/render.md)
# 2. Open the web service shell and run: npm run db:seed  (if demo data missing)

services:
  - type: web
    name: finance-king
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm ci --include=dev && npm run render-build
    preDeployCommand: npx prisma migrate deploy
    startCommand: npm run render:start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: finance-king-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: finance-king-redis
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: AUTH_URL
        fromService:
          type: web
          name: finance-king
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_APP_URL
        fromService:
          type: web
          name: finance-king
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_APP_NAME
        value: Finance King
      - key: OCR_MODE
        value: local
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_REGION
        value: auto
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false
      - key: STORAGE_BUCKET
        value: finance-king-uploads
      - key: STORAGE_FORCE_PATH_STYLE
        value: "false"

  - type: worker
    name: finance-king-worker
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm ci --include=dev && npx prisma generate
    startCommand: npm run worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: finance-king-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: finance-king-redis
          property: connectionString
      - key: ENCRYPTION_KEY
        fromService:
          type: web
          name: finance-king
          envVarKey: ENCRYPTION_KEY
      - key: OCR_MODE
        value: local
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_REGION
        value: auto
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false
      - key: STORAGE_BUCKET
        value: finance-king-uploads
      - key: STORAGE_FORCE_PATH_STYLE
        value: "false"

  - type: keyvalue
    name: finance-king-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: finance-king-db
    databaseName: finance_king
    user: financeking
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "16"
    ipAllowList: []
