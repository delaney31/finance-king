name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: financeking
          POSTGRES_PASSWORD: financeking
          POSTGRES_DB: finance_king
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U financeking -d finance_king"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://financeking:financeking@localhost:5432/finance_king?schema=public
      AUTH_SECRET: ci-test-secret-32-characters-long
      AUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm test
      - run: npm run type-check
      - run: npm run build
